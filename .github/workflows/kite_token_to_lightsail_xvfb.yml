name: kite-token-to-lightsail-xvfb

on:
  schedule:
    # 08:00 IST = 02:30 UTC
    - cron: "30 2 * * 1-5"
  workflow_dispatch:
    inputs:
      do_backfill:
        description: "One-time: backfill ~1 year OHLCV into data/ohlcv_daily"
        required: false
        type: boolean
        default: false
      backfill_days:
        description: "Backfill window (days). Use ~370 for 1 year + buffer."
        required: false
        default: "370"
      hist_rps:
        description: "Throttle for historical API requests (requests/sec)"
        required: false
        default: "2.0"

# Required so GITHUB_TOKEN can push commits back to the repo. :contentReference[oaicite:3]{index=3}
permissions:
  contents: write

jobs:
  token_and_ohlcv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Chrome (with ChromeDriver)
        id: setup_chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install kiteconnect selenium pyotp

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # Fix 1: write SSH key safely + strip CRLF + validate
      - name: Write SSH key + known_hosts (Fix 1)
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$LIGHTSAIL_SSH_KEY" | tr -d '\r' > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keygen -lf ~/.ssh/lightsail_key >/dev/null
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Run Selenium (headed) under Xvfb + upload token to Lightsail
        env:
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID: ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD: ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}

          # Force exact binaries from setup-chrome to avoid mismatch :contentReference[oaicite:4]{index=4}
          CHROME_BIN: ${{ steps.setup_chrome.outputs['chrome-path'] }}
          CHROMEDRIVER_BIN: ${{ steps.setup_chrome.outputs['chromedriver-path'] }}

          HEADLESS: "0"
          KITE_TOKEN_PATH: ./secrets/kite_access_token.json
          DEBUG_DIR: ./debug_login

          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail
          mkdir -p ./secrets ./debug_login
          xvfb-run -a -s "-screen 0 1280x900x24" python scripts/get_kite_access_token_selenium.py

          scp -o IdentitiesOnly=yes -i ~/.ssh/lightsail_key \
            ./secrets/kite_access_token.json \
            "$LIGHTSAIL_USER@$LIGHTSAIL_HOST:/opt/kite/secrets/kite_access_token.json"

      # ---- BACKFILL (manual only) ----
      # NOTE: workflow_dispatch boolean inputs often behave like strings in expressions; use string compare for safety. :contentReference[oaicite:5]{index=5}
      - name: Backfill ~1Y OHLCV (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.do_backfill == true || inputs.do_backfill == 'true') }}
        env:
          KITE_TOKEN_PATH: ./secrets/kite_access_token.json
          OHLCV_OUT_DIR: ./data/ohlcv_daily
          BACKFILL_DAYS: ${{ inputs.backfill_days }}
          RETENTION_DAYS: "370"
          HIST_RPS: ${{ inputs.hist_rps }}
          EXCLUDE_ETF: "1"
        run: |
          set -euo pipefail
          python scripts/backfill_ohlcv_1y.py

      # ---- DAILY UPDATE (schedule + normal manual runs) ----
      - name: Daily OHLCV update (incremental)
        if: ${{ !(github.event_name == 'workflow_dispatch' && (inputs.do_backfill == true || inputs.do_backfill == 'true')) }}
        env:
          KITE_TOKEN_PATH: ./secrets/kite_access_token.json
          OHLCV_OUT_DIR: ./data/ohlcv_daily
          RETENTION_DAYS: "370"
          HIST_RPS: "3.5"
          EXCLUDE_ETF: "1"
        run: |
          set -euo pipefail
          python scripts/update_ohlcv_1y.py

      - name: Commit & push OHLCV updates to repo
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git checkout -B "$BRANCH_NAME"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ohlcv_daily || true
          if git diff --cached --quiet; then
            echo "No OHLCV changes to commit."
            exit 0
          fi

          git commit -m "Update OHLCV daily store"
          git push origin "HEAD:$BRANCH_NAME"

      - name: Upload debug artifacts (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kite-selenium-debug
          path: debug_login/*
          if-no-files-found: ignore
