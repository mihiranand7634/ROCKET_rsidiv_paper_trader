# .github/workflows/kite_token_to_lightsail_xvfb.yml
name: kite-token-to-lightsail-xvfb

on:
  schedule:
    # 08:00 IST = 02:30 UTC
    - cron: "30 2 * * 1-5"
  workflow_dispatch:

jobs:
  token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs Chrome + a compatible ChromeDriver, and exposes their paths as step outputs. :contentReference[oaicite:0]{index=0}
      - name: Setup Chrome (with ChromeDriver)
        id: setup_chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install kiteconnect selenium pyotp

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # ---- FIX 1: write key safely + strip CRLF + validate before SSH/SCP ----
      # "error in libcrypto" is commonly caused by key formatting issues like CRLF/newlines/spaces. :contentReference[oaicite:1]{index=1}
      - name: Write SSH key + known_hosts (Fix 1)
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          # Preserve multiline key, remove Windows CR (\r), ensure final newline
          printf '%s\n' "$LIGHTSAIL_SSH_KEY" | tr -d '\r' > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key

          # Validate key parses (fails fast if secret is corrupted)
          ssh-keygen -lf ~/.ssh/lightsail_key >/dev/null

          # Pin host key to known_hosts (avoid interactive prompt)
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Show Chrome versions (sanity)
        run: |
          "${{ steps.setup_chrome.outputs['chrome-path'] }}" --version
          "${{ steps.setup_chrome.outputs['chromedriver-path'] }}" --version
        # Step outputs are available via steps.<id>.outputs.* :contentReference[oaicite:2]{index=2}

      - name: Run Selenium (headed) under Xvfb + upload token to Lightsail
        env:
          # Kite secrets
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID: ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD: ${{ secrets.KITE_PASSWORD }}

          # Use ONE:
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
          # KITE_PIN: ${{ secrets.KITE_PIN }}

          # Force exact Chrome/Driver installed by setup-chrome (prevents mismatch)
          CHROME_BIN: ${{ steps.setup_chrome.outputs['chrome-path'] }}
          CHROMEDRIVER_BIN: ${{ steps.setup_chrome.outputs['chromedriver-path'] }}

          # Script config
          HEADLESS: "0"
          KITE_TOKEN_PATH: ./secrets/kite_access_token.json
          DEBUG_DIR: ./debug_login

          # Lightsail target
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail
          mkdir -p ./secrets ./debug_login

          xvfb-run -a -s "-screen 0 1280x900x24" python scripts/get_kite_access_token_selenium.py

          # SCP with explicit identity + no key guessing
          scp -o IdentitiesOnly=yes -i ~/.ssh/lightsail_key \
            ./secrets/kite_access_token.json \
            "$LIGHTSAIL_USER@$LIGHTSAIL_HOST:/opt/kite/secrets/kite_access_token.json"

      - name: Upload debug artifacts (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kite-selenium-debug
          path: debug_login/*
          if-no-files-found: ignore
