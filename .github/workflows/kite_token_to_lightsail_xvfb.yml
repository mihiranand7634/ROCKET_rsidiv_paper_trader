name: kite-token-to-lightsail-xvfb

on:
  schedule:
    # 07:00 IST = 01:30 UTC
    - cron: "30 1 * * 1-5"
  workflow_dispatch:
    inputs:
      do_backfill:
        description: "One-time: backfill OHLCV into data/ohlcv_daily"
        required: false
        type: boolean
        default: false
      backfill_days:
        description: "Backfill window (days). Use ~2600 for ~7y + buffer."
        required: false
        default: "2600"
      retention_days:
        description: "Keep last N days in data/ohlcv_daily (>= backfill_days)."
        required: false
        default: "2600"
      hist_rps:
        description: "Throttle for historical API requests (requests/sec)"
        required: false
        default: "2.0"
      artifact_retention_days:
        description: "Actions artifact retention (1-90)"
        required: false
        default: "2"

permissions:
  contents: write

jobs:
  token_and_ohlcv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Chrome (with ChromeDriver)
        id: setup_chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install kiteconnect selenium pyotp pandas numpy

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Write SSH key + known_hosts
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$LIGHTSAIL_SSH_KEY" | tr -d '\r' > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keygen -lf ~/.ssh/lightsail_key >/dev/null
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Run Selenium under Xvfb + upload token to Lightsail
        env:
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID: ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD: ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}

          CHROME_BIN: ${{ steps.setup_chrome.outputs['chrome-path'] }}
          CHROMEDRIVER_BIN: ${{ steps.setup_chrome.outputs['chromedriver-path'] }}

          HEADLESS: "0"
          KITE_TOKEN_PATH: ./secrets/kite_access_token.json
          DEBUG_DIR: ./debug_login

          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail
          mkdir -p ./secrets ./debug_login
          xvfb-run -a -s "-screen 0 1280x900x24" python scripts/get_kite_access_token_selenium.py

          scp -o IdentitiesOnly=yes -i ~/.ssh/lightsail_key \
            ./secrets/kite_access_token.json \
            "$LIGHTSAIL_USER@$LIGHTSAIL_HOST:/opt/kite/secrets/kite_access_token.json"

      # ---- BACKFILL (manual only) ----
      - name: Backfill OHLCV (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.do_backfill == true || inputs.do_backfill == 'true') }}
        env:
          KITE_TOKEN_PATH: ./secrets/kite_access_token.json
          OHLCV_OUT_DIR: ./data/ohlcv_daily
          BACKFILL_DAYS: ${{ inputs.backfill_days }}
          RETENTION_DAYS: ${{ inputs.retention_days }}
          HIST_RPS: ${{ inputs.hist_rps }}
          EXCLUDE_ETF: "1"
        run: |
          set -euo pipefail
          python scripts/backfill_ohlcv_7y.py

      # ---- DAILY UPDATE (schedule + normal manual runs) ----
      - name: Daily OHLCV update (incremental)
        if: ${{ !(github.event_name == 'workflow_dispatch' && (inputs.do_backfill == true || inputs.do_backfill == 'true')) }}
        env:
          KITE_TOKEN_PATH: ./secrets/kite_access_token.json
          OHLCV_OUT_DIR: ./data/ohlcv_daily
          RETENTION_DAYS: "2600"
          HIST_RPS: "3.5"
          EXCLUDE_ETF: "1"
        run: |
          set -euo pipefail
          python scripts/update_ohlcv_7y.py

      - name: Build ohlcv_master.csv.gz from daily store
        env:
          OHLCV_DAILY_DIR: ./data/ohlcv_daily
          OHLCV_MASTER_PATH: ./data/ohlcv_master.csv.gz
          RETENTION_DAYS: "2600"
        run: |
          set -euo pipefail
          python scripts/build_ohlcv_master_from_daily.py

      - name: Upload ohlcv_master.csv.gz as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohlcv_master
          path: data/ohlcv_master.csv.gz
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Commit & push OHLCV updates + master
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git checkout -B "$BRANCH_NAME"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ohlcv_daily data/ohlcv_master.csv.gz || true
          if git diff --cached --quiet; then
            echo "No OHLCV changes to commit."
            exit 0
          fi

          git commit -m "Update OHLCV daily store + master"
          git push origin "HEAD:$BRANCH_NAME"

      - name: Upload debug artifacts (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kite-selenium-debug
          path: debug_login/*
          if-no-files-found: ignore
          retention-days: 7
