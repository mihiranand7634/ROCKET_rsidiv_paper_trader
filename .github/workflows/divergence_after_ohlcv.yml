name: divergence_after_ohlcv

on:
  workflow_run:
    workflows: ["kite-token-to-lightsail-xvfb"]
    types: [completed]

concurrency:
  group: divergence_after_ohlcv-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build_signals_and_paper_trade:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (branch that triggered upstream)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install numpy pandas joblib scikit-learn pyarrow

      - name: Download portfolio_run.zip from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: "data-v1"
        run: |
          set -euo pipefail
          mkdir -p data
          gh release download "${RELEASE_TAG}" -R "${GITHUB_REPOSITORY}" -p "portfolio_run.zip" -D data --clobber
          test -s data/portfolio_run.zip
          ls -lh data/portfolio_run.zip

      - name: Build divergence signals
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python -u scripts/build_divergence_signals_from_daily_store.py
          test -f signals/divergences_latest.csv

      - name: Run paper trader (daily retrain, Option A)
        env:
          PYTHONUNBUFFERED: "1"
          BASELINE_RESULTS_PATH: "./data/portfolio_run.zip"
          # Optional override:
          # RUN_DATE: "2026-03-04"
        run: |
          set -euo pipefail
          python -u scripts/rsidiv_daily_retrain_paper_trader_option1.py

      - name: Export paper CLOSED trades -> data/train_trades_closed.csv (optional)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          # Only run exporter if ledger exists (first days may have no closed trades)
          if [ -s paper_trader_out/state/trade_ledger.csv ]; then
            python -u scripts/export_paper_closed_trades_to_trainset.py
          else
            echo "No paper_trader_out/state/trade_ledger.csv yet (or empty). Skipping export."
          fi

      - name: Prune old paper run folders (keep last ~45 days)
        run: |
          set -euo pipefail
          if [ -d paper_trader_out/run ]; then
            find paper_trader_out/run -mindepth 1 -maxdepth 1 -type d -mtime +45 -print -exec rm -rf {} \;
          fi

      - name: Commit & push outputs
        env:
          BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Do NOT commit the release asset
          rm -f data/portfolio_run.zip || true

          # Signals
          if [ -f signals/divergences_latest.csv ]; then
            git add signals/divergences_latest.csv
          fi

          # Persistent trader state (needed for continuity)
          if [ -d paper_trader_out/state ]; then
            git add paper_trader_out/state
          fi

          # Latest run artifacts (small)
          if [ -d paper_trader_out/run ]; then
            git add paper_trader_out/run/*/orders_to_place.csv 2>/dev/null || true
            git add paper_trader_out/run/*/selected_trades.csv 2>/dev/null || true
            git add paper_trader_out/run/*/candidates_scored.csv 2>/dev/null || true
          fi

          # Rolling trainset (if created/updated)
          if [ -f data/train_trades_closed.csv ]; then
            git add data/train_trades_closed.csv
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "paper-trade: update signals/state/orders"
          git push origin "HEAD:${BRANCH_NAME}"
