# .github/workflows/divergence_after_ohlcv.yml
name: divergence_after_ohlcv

on:
  workflow_run:
    workflows: ["kite-token-to-lightsail-xvfb"]
    types: [completed]

concurrency:
  group: divergence_after_ohlcv
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build_signals_and_paper_trade:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo at upstream commit (head_sha)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install numpy pandas joblib scikit-learn pyarrow

      - name: Download portfolio_run.zip from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: "data-v1"
          ASSET_NAME: "portfolio_run.zip"
        run: |
          set -euo pipefail
          mkdir -p data

          echo "Fetching release assets for tag: ${RELEASE_TAG}"
          ASSET_ID="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
              --jq ".assets[] | select(.name==\"${ASSET_NAME}\") | .id"
          )"

          if [ -z "${ASSET_ID}" ]; then
            echo "ERROR: Asset '${ASSET_NAME}' not found on release tag '${RELEASE_TAG}'"
            exit 1
          fi

          echo "Downloading asset id=${ASSET_ID} -> data/${ASSET_NAME}"
          gh api \
            -H "Accept: application/octet-stream" \
            "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" \
            > "data/${ASSET_NAME}"

          test -s "data/${ASSET_NAME}"
          ls -lh "data/${ASSET_NAME}"

      - name: Build divergence signals
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python -u scripts/build_divergence_signals_from_daily_store.py
          test -f signals/divergences_latest.csv

      - name: Run paper trader (daily retrain, Option A)
        env:
          PYTHONUNBUFFERED: "1"
          BASELINE_RESULTS_PATH: "./data/portfolio_run.zip"
          # Optional:
          # RUN_DATE: "2026-03-04"
        run: |
          set -euo pipefail
          python -u scripts/rsidiv_daily_retrain_paper_trader_option1.py

      - name: Export paper CLOSED trades -> data/train_trades_closed.csv (optional)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          if [ -f scripts/export_paper_closed_trades_to_trainset.py ]; then
            python -u scripts/export_paper_closed_trades_to_trainset.py
          else
            echo "scripts/export_paper_closed_trades_to_trainset.py not found; skipping."
          fi

      - name: Prune old paper run folders (keep last ~45 days)
        run: |
          set -euo pipefail
          if [ -d paper_trader_out/run ]; then
            find paper_trader_out/run -mindepth 1 -maxdepth 1 -type d -mtime +45 -print -exec rm -rf {} \;
          fi

      - name: Commit & push outputs
        env:
          BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Do NOT commit the release asset
          rm -f data/portfolio_run.zip || true

          # Always commit signal output
          if [ -f signals/divergences_latest.csv ]; then
            git add signals/divergences_latest.csv
          fi

          # Persistent paper-trader state (needed for gating + continuity)
          if [ -d paper_trader_out/state ]; then
            git add paper_trader_out/state
          fi

          # Latest run artifacts (small, useful)
          if [ -d paper_trader_out/run ]; then
            git add paper_trader_out/run/*/orders_to_place.csv 2>/dev/null || true
            git add paper_trader_out/run/*/selected_trades.csv 2>/dev/null || true
            git add paper_trader_out/run/*/candidates_scored.csv 2>/dev/null || true
          fi

          # Rolling training set (if updated)
          if [ -f data/train_trades_closed.csv ]; then
            git add data/train_trades_closed.csv
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "paper-trade: update signals/state/orders"
          git push origin "HEAD:${BRANCH_NAME}"
